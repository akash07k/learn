name: CI

# `bun run ci:local` is the CI-parity local gate. This workflow runs the same
# script on GitHub after installing the pinned Bun and pandoc versions.
#
# It runs automatically on pushes to main and on every pull request, and can also be
# triggered on demand from the Actions tab ("Run workflow") or with: gh workflow run CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: 3.1.11.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: CI-parity local gate
        run: bun run ci:local
